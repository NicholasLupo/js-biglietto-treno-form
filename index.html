<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boolean Train</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <header>
        <div class="col text-center p-2 mb-4" id="title">
            <span class="fs-1"> Boolean Train </span>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="row">
                <div class="col" id="in">
                    <form>
                        <div class="col mb-3">
                            <input class="form-control" type="text"
                                placeholder="Inserisci la distanza di kilometri che vuoi fare" name="vojage"
                                id="distance" required />
                        </div>
                        <div class="col mb-3">
                            <input class="form-control" type="text" placeholder="Inserisci la tua età" name="age"
                                id="user" required />
                        </div>
                        <div class="col text-center">
                            <button value="Calcola" id="send" class="p-2 bg-primary text-white btn btn-primary btn-lg"> Calcola </button>
                        </div>
                    </form>
                </div>

            </div>
            <div class="row">
                <div class="col" id="out">
                    <span id="result"> Result </span>
                </div>
            </div>
        </div>
    </main>


    <!-- JS -->
    <script src="script.js"></script>
</body>

</html>
